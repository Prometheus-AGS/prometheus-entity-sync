name: Docker

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/prometheus-ags/entity-sync

jobs:
  build-and-push:
    name: Build and push pes-server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Dockerfile's BUILD CONTEXT is the parent of both this repo and
      # flint-realtime-fabric (see Dockerfile's own comment) — checked out
      # here as sibling directories under $GITHUB_WORKSPACE's parent.
      - name: Checkout prometheus-entity-sync
        uses: actions/checkout@v4
        with:
          path: prometheus-entity-sync

      - name: Checkout flint-realtime-fabric
        uses: actions/checkout@v4
        with:
          repository: Prometheus-AGS/flint-realtime-fabric
          path: flint-realtime-fabric

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: prometheus-entity-sync/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image size budget (<100MB)
        run: |
          IMAGE_REF="${{ env.IMAGE }}@${{ steps.meta.outputs.digest }}"
          SIZE_BYTES=$(docker image inspect "$IMAGE_REF" --format '{{.Size}}')
          SIZE_MB=$((SIZE_BYTES / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -ge 100 ]; then
            echo "::error::Image size ${SIZE_MB}MB exceeds the 100MB budget"
            exit 1
          fi
