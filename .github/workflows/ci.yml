name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pes_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PES_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:55432/pes_test
      # Full property-test case count for the BucketAssigner SQL-injection
      # fuzz (crates/pes-rules/tests/assigner_proptest.rs). Defaults to 100
      # locally for fast iteration; CI runs the proposal-required 10,000.
      PES_PROPTEST_CASES: "10000"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Apply pes-rules test schema
        run: |
          PGPASSWORD=postgres psql -h localhost -p 55432 -U postgres -d pes_test \
            -f crates/pes-rules/tests/schema.sql
      - name: cargo test (workspace, excluding the slow proptest)
        run: cargo test --workspace --release -- --skip assign_never_corrupts_database_for_any_sub_string
      - name: cargo test (full 10,000-case BucketAssigner proptest)
        run: cargo test -p pes-rules --test assigner_proptest --release

  typescript:
    name: TypeScript (typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm -r run test --if-present
