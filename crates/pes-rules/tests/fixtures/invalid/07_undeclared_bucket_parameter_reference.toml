version = "1"

[buckets.user_entities]
description = "data query references bucket_parameters.tenant_id, which was never declared"
parameters = ["user_id"]

[buckets.user_entities.parameter_queries]
user_id = "SELECT id FROM users WHERE auth_user_id = $1"

[buckets.user_entities.data]
entities = "SELECT * FROM entities WHERE owner_id = {bucket_parameters.user_id} AND tenant_id = {bucket_parameters.tenant_id}"
