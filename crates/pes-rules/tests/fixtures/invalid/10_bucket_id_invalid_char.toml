version = "1"

[buckets."user entities"]
description = "Bucket id contains a space, violates [a-z][a-z0-9_-]*"
parameters = ["user_id"]

[buckets."user entities".parameter_queries]
user_id = "SELECT id FROM users WHERE auth_user_id = $1"

[buckets."user entities".data]
entities = "SELECT * FROM entities WHERE owner_id = {bucket_parameters.user_id}"
