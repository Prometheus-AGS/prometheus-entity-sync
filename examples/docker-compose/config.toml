[server]
host = "0.0.0.0"
port = 8080
max_connections = 10000

[postgres]
url = "postgres://postgres:postgres@postgres:5432/postgres"
max_pool_size = 20

[auth]
mode = "hmac"
secret = "${AUTH_SECRET}"

[sync_rules]
path = "/etc/pes-server/sync-rules.toml"

[metrics]
port = 9090

[oplog]
compaction_ttl_days = 7
data_dir = "/var/lib/pes-server/oplog"
